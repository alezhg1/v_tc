<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeCycle Duplicator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --glass-bg: rgba(30, 30, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e1e1e6;
            --text-muted: #a8a8b3;
            --success: #04d361;
            --item-bg: rgba(255, 255, 255, 0.03);
            --btn-neutral: rgba(255, 255, 255, 0.08);
            --btn-neutral-hover: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            max-height: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
        
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .back-link:hover { background: var(--btn-neutral); color: var(--text-main); }

        .upload-block { flex-shrink: 0; margin-bottom: 15px; }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .drop-zone:hover, .drop-zone.active {
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }
        .drop-zone input { display: none; }

        .file-info {
            background: rgba(4, 211, 97, 0.1);
            border: 1px solid rgba(4, 211, 97, 0.2);
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--success);
        }
        .file-info.show { display: flex; }

        .action-block { flex-shrink: 0; margin-bottom: 15px; }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-gen {
            background: var(--btn-neutral);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-gen:hover:not(:disabled) {
            background: var(--btn-neutral-hover);
            transform: translateY(-2px);
        }
        .btn-gen:disabled {
            background: rgba(255, 255, 255, 0.03);
            color: #505059;
            border-color: transparent;
            cursor: not-allowed;
            transform: none;
        }

        .results-block {
            flex-grow: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .res-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .badge {
            background: var(--success);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .file-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 5px;
            margin-bottom: 10px;
            min-height: 0;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .f-item {
            background: var(--item-bg);
            padding: 10px 14px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .f-name { font-family: 'Consolas', monospace; font-size: 0.85rem; }
        .f-cycle { font-size: 0.7rem; color: var(--text-muted); margin-left: 8px; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; }

        .btn-dl {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            width: auto;
            margin: 0;
        }
        .btn-dl:hover { background: var(--btn-neutral-hover); }

        .zip-block { flex-shrink: 0; }
        .btn-zip {
            background: var(--btn-neutral);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }
        .btn-zip:hover { background: var(--btn-neutral-hover); }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1>️ TimeCycle Duplicator</h1>
        <a href="main_page.html" class="back-link">← Назад</a>
    </div>

    <div class="upload-block">
        <div class="drop-zone" id="dropZone">
            Перетащи файл сюда или нажми для выбора
            <input type="file" id="fileInput" accept=".xml">
        </div>
        <div class="file-info" id="fileInfo">
            Загружен: <span id="fileNameDisplay"></span>
        </div>
    </div>

    <div class="action-block">
        <button id="genBtn" class="btn-gen" disabled>Сгенерировать все файлы</button>
    </div>

    <div class="results-block">
        <div class="res-header">
            <h3>Результат</h3>
            <span class="badge" id="countBadge">0 файлов</span>
        </div>
        <div class="file-list" id="fileList"></div>
    </div>

    <div class="zip-block">
        <button id="zipBtn" class="btn-zip">Скачать всё архивом (ZIP)</button>
    </div>
</div>

<script>
const FILE_MAP = [
    { file: "w_blizzard.xml", cycle: "BLIZZARD" }, { file: "w_clear.xml", cycle: "CLEAR" },
    { file: "w_clearing.xml", cycle: "CLEARING" }, { file: "w_clouds.xml", cycle: "CLOUDS" },
    { file: "w_extrasunny.xml", cycle: "EXTRASUNNY" }, { file: "w_foggy.xml", cycle: "FOGGY" },
    { file: "w_halloween.xml", cycle: "HALLOWEEN" }, { file: "w_neutral.xml", cycle: "NEUTRAL" },
    { file: "w_overcast.xml", cycle: "OVERCAST" }, { file: "w_rain.xml", cycle: "RAIN" },
    { file: "w_rainhalloween.xml", cycle: "RAIN_HALLOWEEN" }, { file: "w_smog.xml", cycle: "SMOG" },
    { file: "w_snow.xml", cycle: "SNOW" }, { file: "w_snowhalloween.xml", cycle: "SNOW_HALLOWEEN" },
    { file: "w_snowlight.xml", cycle: "SNOWLIGHT" }, { file: "w_thunder.xml", cycle: "THUNDER" },
    { file: "w_xmas.xml", cycle: "XMAS" }
];

let sourceContent = "";
let generatedData = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileNameDisplay = document.getElementById('fileNameDisplay');
const genBtn = document.getElementById('genBtn');
const fileList = document.getElementById('fileList');
const countBadge = document.getElementById('countBadge');
const zipBtn = document.getElementById('zipBtn');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('active');
    if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) processFile(fileInput.files[0]); });

function processFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        sourceContent = e.target.result;
        const size = file.size > 1024 ? (file.size/1024).toFixed(1) + ' KB' : file.size + ' B';
        fileNameDisplay.textContent = `${file.name} (${size})`;
        fileInfo.classList.add('show');
        genBtn.disabled = false;
    };
    reader.readAsText(file);
}

genBtn.addEventListener('click', () => {
    if (!sourceContent) return;
    generatedData = [];
    fileList.innerHTML = '';
    FILE_MAP.forEach((item, index) => {
        let newContent = sourceContent.replace(/(name\s*=\s*")[^"]+(")/i, `$1${item.cycle}$2`);
        generatedData.push({ name: item.file, content: newContent, cycle: item.cycle });
        const div = document.createElement('div');
        div.className = 'f-item';
        div.innerHTML = `<div style="display:flex; align-items:center;"><span class="f-name">${item.file}</span><span class="f-cycle">→ ${item.cycle}</span></div><button class="btn-dl" onclick="downloadSingle(${index})">Скачать</button>`;
        fileList.appendChild(div);
    });
    countBadge.textContent = `${generatedData.length} файлов`;
    zipBtn.style.display = 'flex';
});

window.downloadSingle = (index) => {
    const data = generatedData[index];
    const blob = new Blob([data.content], { type: 'application/xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = data.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
};

zipBtn.addEventListener('click', async () => {
    const originalText = zipBtn.innerHTML;
    zipBtn.innerHTML = 'Создаю архив...'; zipBtn.disabled = true;
    try {
        const zip = new JSZip();
        generatedData.forEach(f => zip.file(f.name, f.content));
        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'timecycle_weather_pack.zip';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
    } catch (err) { alert('Ошибка: ' + err.message); } 
    finally { zipBtn.innerHTML = originalText; zipBtn.disabled = false; }
});
</script>
</body>
</html>
