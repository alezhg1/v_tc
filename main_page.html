<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA V Tools - Main</title>
    <style>
        :root {
            --bg-color: #121214;
            --glass-bg: rgba(30, 30, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e1e1e6;
            --text-muted: #a8a8b3;
            --item-bg: rgba(255, 255, 255, 0.03);
            --item-hover: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: -10px;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            justify-content: center;
        }

        .nav-item {
            background: var(--item-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-item:hover {
            background: var(--item-hover);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .nav-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.5;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>GTA V Tools</h1>
            <p class="subtitle">Набор утилит для моддинга и оптимизации</p>
        </div>

        <div class="nav-list">
            <a href="timecycle_duplicator.html" class="nav-item">
                <span class="nav-title">TimeCycle Duplicator</span>
                <span class="nav-desc">Генерация полного пака погоды из одного XML файла</span>
            </a>
            
            <a href="optimization.html" class="nav-item">
                <span class="nav-title">PC Optimization</span>
                <span class="nav-desc">Инструменты для настройки производительности системы</span>
            </a>
        </div>

        <div class="footer">v1.0 | Local Tools</div>
    </div>
</body>
</html>
